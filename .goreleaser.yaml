# GoReleaser: https://goreleaser.com
# Local snapshot:  goreleaser release --snapshot --clean
# Tag release:       git tag v1.0.0 && git push origin v1.0.0  (with CI token)
version: 2

project_name: sse

before:
  hooks:
    - go mod tidy

builds:
  - id: sse
    main: ./cmd/sse
    binary: sse
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: tarballs
    format: tar.gz
    name_template: "sse_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

checksum:
  name_template: SHA256SUMS
  algorithm: sha256

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - Merge pull request
      - Merge branch
